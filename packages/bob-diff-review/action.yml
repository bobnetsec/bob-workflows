name: 'Bob Diff Review'
description: >
  Run Hacker Bob's headless Claude-based diff review on an open pull request.
  Posts inline PR review comments and a Check Run summarising findings by
  severity. Requires ANTHROPIC_API_KEY and BOB_INSTALL_TOKEN secrets.

branding:
  color: 'orange'
  icon: 'shield'

inputs:
  github-token:
    description: >
      GitHub token used to post review comments on the pull request and to
      create the "Bob Diff Review" Check Run. Must have pull-requests:write
      and checks:write permissions. Pass via secrets.GITHUB_TOKEN.
    required: true

  anthropic-api-key:
    description: >
      Anthropic API key used to authenticate the claude headless runner.
      Store as the org-level secret ANTHROPIC_API_KEY and pass via the
      with block: anthropic-api-key = secrets.ANTHROPIC_API_KEY.
    required: true

  bob-install-token:
    description: >
      GitHub App installation token or fine-grained PAT with read:packages
      and contents:read scopes. Store as the org-level secret BOB_INSTALL_TOKEN
      and pass via the with block: bob-install-token = secrets.BOB_INSTALL_TOKEN.
    required: true

  min-severity-for-failure:
    description: >
      Minimum finding severity that causes the Check Run to report a failure
      conclusion. Accepted values: "critical", "high", "medium", "low".
      Defaults to "high" so that only critical or high findings block the PR
      status badge.
    required: false
    default: 'high'

  anthropic-model:
    description: >
      Optional Anthropic model identifier forwarded to the claude CLI subprocess
      as ANTHROPIC_MODEL. Use a cost-optimised model (e.g. "claude-haiku-4-5")
      for high-volume repositories or budget-constrained environments. Leave
      empty to use the claude CLI default.
    required: false
    default: ''

outputs:
  findings_count:
    description: >
      Total number of findings recorded by the Bob diff review session across
      all severity levels.

  critical_count:
    description: >
      Number of critical-severity findings recorded by the Bob diff review
      session.

  review_url:
    description: >
      HTML URL of the GitHub pull request review posted by this action.

runs:
  using: 'node20'
  main: 'dist/index.js'

