name: Secret Test Reusable
on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      BOB_INSTALL_TOKEN:
        required: false

jobs:
  secret-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        shell: bash
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then echo "ANTHROPIC_API_KEY is set (masked in logs)"; fi
          if [ -n "$BOB_INSTALL_TOKEN" ]; then echo "BOB_INSTALL_TOKEN is set (masked in logs)"; fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BOB_INSTALL_TOKEN: ${{ secrets.BOB_INSTALL_TOKEN }}
