###############################################################################
# Bob Diff Review — reusable workflow (W1)
#
# Hosted in bobnetsec/bob-workflows. Target repos call it via:
#
#   jobs:
#     bob-review:
#       uses: bobnetsec/bob-workflows/.github/workflows/bob-review.yml@main
#       secrets: inherit
#
# CRITICAL: Callers from a different repository must declare permissions at
# the workflow level (not job level — job-level permissions are not allowed
# on workflow_call jobs). Add this to your caller workflow:
#
#   permissions:
#     pull-requests: write
#     checks: write
#     contents: read
#
# Without this, GitHub raises startup_failure because the called workflow's
# job declares permissions that the caller's token cannot provide.
###############################################################################

name: Bob Diff Review

on:
  workflow_call:
    inputs:
      anthropic-model:
        description: >
          Optional Anthropic model override forwarded to the claude subprocess as
          ANTHROPIC_MODEL. Use a cost-optimised model (e.g. "claude-haiku-4-5")
          to reduce API spend on high-volume repos. Leave empty to use the claude
          CLI default.
        required: false
        default: ""
        type: string
    secrets:
      # Anthropic credentials — AT LEAST ONE of ANTHROPIC_OAUTH_TOKEN /
      # ANTHROPIC_API_KEY must be provided by the caller. Both are declared
      # optional here so callers can supply either one; the action enforces the
      # at-least-one rule and fails fast when neither is present. PRECEDENCE:
      # OAuth wins — when both are set the action injects only
      # CLAUDE_CODE_OAUTH_TOKEN, so the API key cannot silently shadow OAuth
      # and exhaust pay-per-use credits.
      ANTHROPIC_OAUTH_TOKEN:
        required: false
        description: "Anthropic OAuth token (recommended, from `claude setup-token`) for the headless Claude diff-review session. Takes precedence over ANTHROPIC_API_KEY."
      ANTHROPIC_API_KEY:
        required: false
        description: "Anthropic API key (pay-per-use) for the headless Claude diff-review session. Optional fallback; ignored when ANTHROPIC_OAUTH_TOKEN is also set."
      BOB_INSTALL_TOKEN:
        required: false
        description: "GitHub App token or PAT with read:packages scope."

jobs:
  bob-diff-review:
    name: Bob Diff Review
    runs-on: ubuntu-latest

    # -------------------------------------------------------------------------
    # Permissions
    # Composite actions cannot declare a permissions block — it must live here
    # at the job level.
    #   pull-requests:write — post inline review comments on the PR
    #   checks:write        — create and update the "Bob Diff Review" Check Run
    #   contents:read       — fetch the PR diff
    # -------------------------------------------------------------------------
    permissions:
      pull-requests: write
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Bob workspace cache (C1)
        id: cache-bob-workspace
        uses: bobnetsec/bob-workflows/.github/actions/cache-bob-workspace@main
        with:
          bob_version: ${{ vars.BOB_VERSION }}
          bob_install_token: ${{ secrets.BOB_INSTALL_TOKEN }}

      - name: Restore Bob session cache (C2)
        id: cache-bob-session
        uses: bobnetsec/bob-workflows/.github/actions/cache-bob-session@main
        with:
          repository_id: ${{ github.repository_id }}
          sha: ${{ github.sha }}
          base_ref: ${{ github.base_ref }}

      - name: Run Bob Diff Review
        id: bob-diff-review
        uses: bobnetsec/bob-workflows/packages/bob-diff-review@main
        env:
          SKIP_SURFACE_BUILD: ${{ steps.cache-bob-session.outputs.cache-hit-symbol-index }}
          ANTHROPIC_MODEL: ${{ inputs.anthropic-model }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Anthropic auth: pass BOTH credentials through. At least one must be
          # set; the action fails fast if neither is provided. OAuth WINS — when
          # both are present the action injects only CLAUDE_CODE_OAUTH_TOKEN and
          # omits ANTHROPIC_API_KEY so the key cannot shadow OAuth or burn
          # pay-per-use credits.
          anthropic-oauth-token: ${{ secrets.ANTHROPIC_OAUTH_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          bob-install-token: ${{ secrets.BOB_INSTALL_TOKEN }}

      - name: Log review outputs
        if: always()
        shell: bash
        run: |
          echo "findings_count=${{ steps.bob-diff-review.outputs.findings_count }}"
          echo "critical_count=${{ steps.bob-diff-review.outputs.critical_count }}"
          echo "review_url=${{ steps.bob-diff-review.outputs.review_url }}"
