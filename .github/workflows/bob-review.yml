###############################################################################
# Bob Diff Review — reusable workflow (W1)
#
# Hosted in bobnetsec/bob-workflows. Target repos call it via:
#
#   jobs:
#     bob-review:
#       uses: bobnetsec/bob-workflows/.github/workflows/bob-review.yml@main
#       secrets: inherit
###############################################################################

name: Bob Diff Review

on:
  workflow_call:
    inputs:
      anthropic-model:
        description: >
          Optional Anthropic model override forwarded to the claude subprocess as
          ANTHROPIC_MODEL. Use a cost-optimised model (e.g. "claude-haiku-4-5")
          to reduce API spend on high-volume repos. Leave empty to use the claude
          CLI default.
        required: false
        default: ""
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
        description: "Anthropic API key for the headless Claude diff-review session."
      BOB_INSTALL_TOKEN:
        required: false
        description: "GitHub App token or PAT with read:packages scope."

jobs:
  bob-diff-review:
    name: Bob Diff Review
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Bob workspace cache (C1)
        id: cache-bob-workspace
        uses: bobnetsec/bob-workflows/.github/actions/cache-bob-workspace@main
        with:
          bob_version: ${{ vars.BOB_VERSION }}
          bob_install_token: ${{ secrets.BOB_INSTALL_TOKEN }}

      - name: Restore Bob session cache (C2)
        id: cache-bob-session
        uses: bobnetsec/bob-workflows/.github/actions/cache-bob-session@main
        with:
          repository_id: ${{ github.repository_id }}
          sha: ${{ github.sha }}
          base_ref: ${{ github.base_ref }}

      - name: Run Bob Diff Review
        id: bob-diff-review
        uses: bobnetsec/bob-workflows/packages/bob-diff-review@main
        env:
          SKIP_SURFACE_BUILD: ${{ steps.cache-bob-session.outputs.cache-hit-symbol-index }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          bob-install-token: ${{ secrets.BOB_INSTALL_TOKEN }}
          anthropic-model: ${{ inputs.anthropic-model }}

      - name: Log review outputs
        if: always()
        shell: bash
        run: |
          echo "findings_count=${{ steps.bob-diff-review.outputs.findings_count }}"
          echo "critical_count=${{ steps.bob-diff-review.outputs.critical_count }}"
          echo "review_url=${{ steps.bob-diff-review.outputs.review_url }}"

