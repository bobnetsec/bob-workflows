name: Checkout Test Reusable
on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: false

jobs:
  checkout-test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Show context
        shell: bash
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo "sha: ${{ github.sha }}"
          if [ -n "$ANTHROPIC_API_KEY" ]; then echo "ANTHROPIC_API_KEY: present"; fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
