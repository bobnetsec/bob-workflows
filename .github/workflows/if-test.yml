name: If Condition Test
on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_call' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Test
        run: echo "If condition passed - event_name=${{ github.event_name }}"
