name: Cache Bob Workspace
description: >
  Restore ~/bob-workspace from cache keyed on runner OS and BOB_VERSION.
  On cache miss, checks out hacker-bob at BOB_VERSION and runs install.sh
  to populate ~/bob-workspace/node_modules. On cache hit, skips install.

inputs:
  bob_version:
    description: "The Bob version tag to install (e.g. v2.0.0). Used to key the cache."
    required: true

  bob_install_token:
    description: "GitHub token with read access to the hacker-bob source repo."
    required: false
    default: ''

outputs:
  cache-hit:
    description: "'true' when a matching cache entry was restored."
    value: ${{ steps.cache-bob.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Validate BOB_VERSION is set
      if: inputs.bob_version == ''
      shell: bash
      run: |
        echo "::error::BOB_VERSION (inputs.bob_version) is empty."
        exit 1

    - name: Restore Bob workspace cache
      id: cache-bob
      uses: actions/cache@v4
      with:
        path: ~/bob-workspace
        key: ${{ runner.os }}-bob-workspace-${{ inputs.bob_version }}

    - name: Check out hacker-bob source
      if: steps.cache-bob.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: vmihalis/hacker-bob
        ref: ${{ inputs.bob_version }}
        path: _hacker_bob_src
        token: ${{ inputs.bob_install_token != '' && inputs.bob_install_token || github.token }}

    - name: Install Bob into ~/bob-workspace
      if: steps.cache-bob.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        INSTALL_TARGET="$HOME/bob-workspace"
        SRC="${GITHUB_WORKSPACE}/_hacker_bob_src"
        echo "Installing Bob ${{ inputs.bob_version }} into $INSTALL_TARGET"
        mkdir -p "$INSTALL_TARGET"
        bash "$SRC/install.sh" "$INSTALL_TARGET"
        if [[ ! -d "$INSTALL_TARGET/node_modules" ]]; then
          echo "::error::install.sh did not create $INSTALL_TARGET/node_modules"
          exit 1
        fi
        echo "Bob workspace ready at $INSTALL_TARGET"
        echo "node_modules size: $(du -sh "$INSTALL_TARGET/node_modules" | cut -f1)"
