name: Cache Bob Workspace
description: >
  Restore ~/bob-workspace from cache keyed on runner OS and BOB_VERSION.
  On cache miss, installs hacker-bob via npx to populate ~/bob-workspace.
  On cache hit, skips install entirely.

inputs:
  bob_version:
    description: "The Bob version tag to install (e.g. v2.0.0). Used to key the cache."
    required: true

  bob_install_token:
    description: "GitHub token (unused, kept for API compatibility)."
    required: false
    default: ''

outputs:
  cache-hit:
    description: "'true' when a matching cache entry was restored."
    value: ${{ steps.cache-bob.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Validate BOB_VERSION is set
      if: inputs.bob_version == ''
      shell: bash
      run: |
        echo "::error::BOB_VERSION (inputs.bob_version) is empty."
        exit 1

    - name: Restore Bob workspace cache
      id: cache-bob
      uses: actions/cache@v4
      with:
        path: ~/bob-workspace
        key: ${{ runner.os }}-bob-workspace-${{ inputs.bob_version }}

    - name: Install Bob via npx
      if: steps.cache-bob.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        INSTALL_TARGET="$HOME/bob-workspace"
        BOB_VERSION="${{ inputs.bob_version }}"
        # Strip leading 'v' for npm version spec
        NPM_VERSION="${BOB_VERSION#v}"
        echo "Installing hacker-bob@${NPM_VERSION} into $INSTALL_TARGET"
        mkdir -p "$INSTALL_TARGET"
        npx -y "hacker-bob@${NPM_VERSION}" install "$INSTALL_TARGET"
        if [[ ! -d "$INSTALL_TARGET/node_modules" ]]; then
          echo "::error::hacker-bob install did not create $INSTALL_TARGET/node_modules"
          exit 1
        fi
        echo "Bob workspace ready at $INSTALL_TARGET"
        echo "node_modules size: $(du -sh "$INSTALL_TARGET/node_modules" | cut -f1)"
