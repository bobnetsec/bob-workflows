name: Cache Bob Workspace
description: >
  Restore ~/bob-workspace from cache keyed on runner OS and BOB_VERSION.
  On cache miss, installs the claude CLI, the hacker-bob runtime (which bundles
  the Bob MCP server at mcp/server.js), and copies the bundled bob-diff-review
  skill to ~/.claude/skills. Always exports BOB_MCP_SERVER_PATH so the headless
  claude invocation can wire the Bob MCP (PATH A). On cache hit, restores
  everything and re-derives PATH + BOB_MCP_SERVER_PATH.

inputs:
  bob_version:
    description: "The Bob version tag to install (e.g. v1.3.5). Used to key the cache."
    required: true

  bob_install_token:
    description: "GitHub token (kept for API compatibility)."
    required: false
    default: ''

outputs:
  cache-hit:
    description: "'true' when a matching cache entry was restored."
    value: ${{ steps.cache-bob.outputs.cache-hit }}
  mcp-server-path:
    description: "Absolute path to the Bob MCP server.js, or '' when unavailable."
    value: ${{ steps.mcp-path.outputs.path }}

runs:
  using: composite
  steps:
    - name: Validate BOB_VERSION is set
      if: inputs.bob_version == ''
      shell: bash
      run: |
        echo "::error::BOB_VERSION (inputs.bob_version) is empty."
        exit 1

    - name: Restore Bob workspace cache
      id: cache-bob
      uses: actions/cache@v4
      with:
        path: |
          ~/bob-workspace
          ~/.claude/skills
        # v5: workspace now also contains the hacker-bob runtime (Bob MCP server).
        key: ${{ runner.os }}-bob-workspace-${{ inputs.bob_version }}-v5

    - name: Install Claude CLI
      if: steps.cache-bob.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        INSTALL_TARGET="$HOME/bob-workspace"
        mkdir -p "$INSTALL_TARGET"

        echo "Installing claude CLI..."
        npm install -g @anthropic-ai/claude-code --prefix "$INSTALL_TARGET" 2>&1 | tail -5
        ls "$INSTALL_TARGET/bin/claude" 2>/dev/null && echo "claude binary found" || echo "claude binary not found in bin/"

        echo "Bob workspace setup complete at $INSTALL_TARGET"

    - name: Install hacker-bob runtime (Bob MCP server)
      if: steps.cache-bob.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        INSTALL_TARGET="$HOME/bob-workspace"
        # npm rejects a leading "v" as a version spec (treats it as a dist-tag),
        # so strip it: v1.3.5 -> 1.3.5. hacker-bob is a public npm package whose
        # tarball bundles the full mcp/ runtime; its declared deps (proxy-agent,
        # psl, claude-agent-sdk) are installed alongside so server.js resolves.
        VER="${BOB_VERSION#v}"
        echo "Installing hacker-bob@${VER} ..."
        npm install -g "hacker-bob@${VER}" --prefix "$INSTALL_TARGET" 2>&1 | tail -5
        SERVER="$INSTALL_TARGET/lib/node_modules/hacker-bob/mcp/server.js"
        if [[ -f "$SERVER" ]]; then
          echo "Bob MCP server installed at $SERVER"
        else
          echo "::warning::hacker-bob installed but mcp/server.js not found at $SERVER — PATH A will be unavailable"
        fi
      env:
        BOB_VERSION: ${{ inputs.bob_version }}

    - name: Install bob-diff-review skill
      # Always run (not cache-gated): the skill is cheap to copy and lives in
      # this action's repo, so copying it every run keeps it current even on a
      # workspace cache hit — otherwise a cached ~/.claude/skills would mask
      # SKILL.md updates.
      shell: bash
      run: |
        set -euo pipefail
        # The bob-diff-review skill is bundled in this action's repo under
        # .claude/skills/bob-diff-review/SKILL.md. Copy it to ~/.claude/skills
        # so that the headless claude --print /bob-diff-review invocation resolves.
        ACTION_DIR="${{ github.action_path }}"
        SKILL_SRC="$ACTION_DIR/../../../.claude/skills/bob-diff-review"
        SKILL_DST="$HOME/.claude/skills/bob-diff-review"

        if [[ -d "$SKILL_SRC" ]]; then
          mkdir -p "$HOME/.claude/skills"
          cp -r "$SKILL_SRC" "$SKILL_DST"
          echo "Installed bob-diff-review skill to $SKILL_DST"
          ls "$SKILL_DST/" | head -5
        else
          echo "::error::bob-diff-review skill not found at $SKILL_SRC"
          exit 1
        fi

    - name: Add bob-workspace bin to PATH
      shell: bash
      run: |
        INSTALL_TARGET="$HOME/bob-workspace"
        # Add all possible claude binary locations to PATH
        echo "$INSTALL_TARGET/bin" >> "$GITHUB_PATH"
        echo "$(npm bin -g --prefix "$INSTALL_TARGET" 2>/dev/null || true)" >> "$GITHUB_PATH"
        # Verify claude is accessible
        export PATH="$INSTALL_TARGET/bin:$PATH"
        CLAUDE_VER="$(claude --version 2>/dev/null)" && echo "claude CLI is on PATH: $CLAUDE_VER" || echo "claude CLI not found in PATH"
        # Verify skills installed
        ls "$HOME/.claude/skills/" 2>/dev/null | head -5 || echo "no skills found in ~/.claude/skills/"

    - name: Export Bob MCP server path
      id: mcp-path
      shell: bash
      run: |
        # Runs on BOTH cache hit and miss: the cached ~/bob-workspace contains the
        # hacker-bob runtime, so re-derive the path either way. Exporting to
        # GITHUB_ENV makes BOB_MCP_SERVER_PATH visible to later job steps,
        # including the bob-diff-review action whose runner reads it to wire the
        # Bob MCP (PATH A). When the server is missing or fails to boot, leave it
        # unset so the runner falls back to PATH B.
        SERVER="$HOME/bob-workspace/lib/node_modules/hacker-bob/mcp/server.js"
        if [[ -f "$SERVER" ]]; then
          # Boot probe: confirm the server responds to an MCP initialize before
          # advertising it, so a broken install degrades to PATH B rather than
          # failing the review.
          PROBE='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"probe","version":"0"}}}'
          if echo "$PROBE" | timeout 20 node "$SERVER" 2>/dev/null | grep -q '"result"'; then
            echo "BOB_MCP_SERVER_PATH=$SERVER" >> "$GITHUB_ENV"
            echo "path=$SERVER" >> "$GITHUB_OUTPUT"
            echo "Bob MCP server verified and exported: $SERVER"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "::warning::Bob MCP server at $SERVER did not boot; PATH A disabled (falling back to PATH B)"
          fi
        else
          echo "path=" >> "$GITHUB_OUTPUT"
          echo "::warning::Bob MCP server not found at $SERVER; PATH A disabled (falling back to PATH B)"
        fi
