name: Cache Bob Workspace
description: >
  Restore ~/bob-workspace from cache keyed on runner OS and BOB_VERSION.
  On cache miss, installs claude CLI and copies the bundled bob-diff-review
  skill to ~/.claude/skills so that /bob-diff-review is available headlessly.
  On cache hit, restores everything and adds ~/bob-workspace/bin to PATH.

inputs:
  bob_version:
    description: "The Bob version tag to install (e.g. v1.3.5). Used to key the cache."
    required: true

  bob_install_token:
    description: "GitHub token (kept for API compatibility)."
    required: false
    default: ''

outputs:
  cache-hit:
    description: "'true' when a matching cache entry was restored."
    value: ${{ steps.cache-bob.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Validate BOB_VERSION is set
      if: inputs.bob_version == ''
      shell: bash
      run: |
        echo "::error::BOB_VERSION (inputs.bob_version) is empty."
        exit 1

    - name: Restore Bob workspace cache
      id: cache-bob
      uses: actions/cache@v4
      with:
        path: |
          ~/bob-workspace
          ~/.claude/skills
        key: ${{ runner.os }}-bob-workspace-${{ inputs.bob_version }}-v4

    - name: Install Claude CLI
      if: steps.cache-bob.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        INSTALL_TARGET="$HOME/bob-workspace"
        mkdir -p "$INSTALL_TARGET"

        echo "Installing claude CLI..."
        npm install -g @anthropic-ai/claude-code --prefix "$INSTALL_TARGET" 2>&1 | tail -5
        ls "$INSTALL_TARGET/bin/claude" 2>/dev/null && echo "claude binary found" || echo "claude binary not found in bin/"

        echo "Bob workspace setup complete at $INSTALL_TARGET"

    - name: Install bob-diff-review skill
      if: steps.cache-bob.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        # The bob-diff-review skill is bundled in this action's repo under
        # .claude/skills/bob-diff-review/SKILL.md. Copy it to ~/.claude/skills
        # so that the headless claude --print /bob-diff-review invocation resolves.
        ACTION_DIR="${{ github.action_path }}"
        SKILL_SRC="$ACTION_DIR/../../../.claude/skills/bob-diff-review"
        SKILL_DST="$HOME/.claude/skills/bob-diff-review"

        if [[ -d "$SKILL_SRC" ]]; then
          mkdir -p "$HOME/.claude/skills"
          cp -r "$SKILL_SRC" "$SKILL_DST"
          echo "Installed bob-diff-review skill to $SKILL_DST"
          ls "$SKILL_DST/" | head -5
        else
          echo "::error::bob-diff-review skill not found at $SKILL_SRC"
          exit 1
        fi

    - name: Add bob-workspace bin to PATH
      shell: bash
      run: |
        INSTALL_TARGET="$HOME/bob-workspace"
        # Add all possible claude binary locations to PATH
        echo "$INSTALL_TARGET/bin" >> "$GITHUB_PATH"
        echo "$(npm bin -g --prefix "$INSTALL_TARGET" 2>/dev/null || true)" >> "$GITHUB_PATH"
        # Verify claude is accessible
        export PATH="$INSTALL_TARGET/bin:$PATH"
        CLAUDE_VER="$(claude --version 2>/dev/null)" && echo "claude CLI is on PATH: $CLAUDE_VER" || echo "claude CLI not found in PATH"
        # Verify skills installed
        ls "$HOME/.claude/skills/" 2>/dev/null | head -5 || echo "no skills found in ~/.claude/skills/"
