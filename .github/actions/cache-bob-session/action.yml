name: Cache Bob Session
description: >
  Restore the Bob session root (~/hacker-bob-sessions) for the target repository
  from cache. The headless skill lets the MCP derive the repo-session
  target_domain (repo-<name>-<sha8>) from the checked-out repo path, which is
  stable across runs on a GitHub-hosted runner — so the whole session root is
  cached rather than a single gh-<id> subdirectory.

  Cache key is the exact commit SHA so fresh PRs start with the base-branch
  session as a warm start via restore-keys. After restore, checks for any
  symbol-surface-index.json under the session root and sets the
  cache-hit-symbol-index output so the caller can skip the S3 surface-build
  phase (SKIP_SURFACE_BUILD).

inputs:
  repository_id:
    description: >
      The numeric GitHub repository ID (github.repository_id). Cast to string
      in the cache key so a zero value is caught early rather than producing a
      key suffix of just '-'.
    required: true
  sha:
    description: >
      The full commit SHA being reviewed (github.sha). Used as the primary
      cache key so each unique commit has its own deterministic entry.
    required: true
  base_ref:
    description: >
      The base branch ref (github.base_ref, e.g. 'main'). Used as the first
      restore-key prefix so a PR always picks up the closest prior session
      from its target branch before falling back to any session for the repo.
    required: false
    default: ''

outputs:
  cache-hit:
    description: "'true' when the primary key matched exactly; 'false' otherwise."
    value: ${{ steps.cache-session.outputs.cache-hit }}
  cache-hit-symbol-index:
    description: >
      'true' when a symbol-surface-index.json exists under the restored session
      root, meaning the S3 route-extraction + symbol-index build phase can be
      skipped. 'false' when no such file is present or the cache missed.
    value: ${{ steps.detect-symbol-index.outputs.cache_hit_symbol_index }}
  session_root:
    description: "Absolute path to the Bob session root directory."
    value: ${{ steps.set-session-dir.outputs.session_root }}

runs:
  using: composite
  steps:
    # ------------------------------------------------------------------
    # 0. Guard: abort early if repository_id is empty or zero.
    #    An empty ID produces the key prefix "<OS>-bob-session--" which
    #    could collide across repositories.
    # ------------------------------------------------------------------
    - name: Validate repository_id is set
      shell: bash
      run: |
        REPO_ID="${{ inputs.repository_id }}"
        if [[ -z "$REPO_ID" || "$REPO_ID" == "0" ]]; then
          echo "::error::inputs.repository_id is empty or zero. Pass github.repository_id to this action."
          exit 1
        fi

    # ------------------------------------------------------------------
    # 1. Compute the session root. The skill derives the per-repo session
    #    slug (repo-<name>-<sha8>) at runtime, so we cache the whole root and
    #    let whatever directory the skill creates be saved/restored.
    # ------------------------------------------------------------------
    - name: Set session root
      id: set-session-dir
      shell: bash
      run: |
        SESSION_ROOT="$HOME/hacker-bob-sessions"
        mkdir -p "$SESSION_ROOT"
        echo "session_root=${SESSION_ROOT}" >> "$GITHUB_OUTPUT"
        echo "Bob session root: $SESSION_ROOT"

    # ------------------------------------------------------------------
    # 2. Restore the session root from cache.
    #
    #    Primary key (exact SHA match — same commit, no work needed):
    #      <OS>-bob-session-<repository_id>-<sha>
    #    Restore-key 1 (base-branch prefix — closest warm start for PRs).
    #    Restore-key 2 (broadest fallback — any prior session for repo).
    # ------------------------------------------------------------------
    - name: Restore Bob session cache
      id: cache-session
      uses: actions/cache@v4
      with:
        path: ~/hacker-bob-sessions
        key: ${{ runner.os }}-bob-session-${{ inputs.repository_id }}-${{ inputs.sha }}
        restore-keys: |
          ${{ runner.os }}-bob-session-${{ inputs.repository_id }}-${{ inputs.base_ref }}
          ${{ runner.os }}-bob-session-${{ inputs.repository_id }}-

    # ------------------------------------------------------------------
    # 3. After cache restore, detect whether any symbol-surface-index.json
    #    is present under the session root. If so, the S3 phase (route
    #    extraction + symbol index build) can be skipped.
    #
    #    Output: cache_hit_symbol_index — 'true' or 'false' (string).
    #    The caller maps this to the SKIP_SURFACE_BUILD env var.
    # ------------------------------------------------------------------
    - name: Detect symbol surface index
      id: detect-symbol-index
      shell: bash
      run: |
        SESSION_ROOT="$HOME/hacker-bob-sessions"
        INDEX_FILE="$(find "$SESSION_ROOT" -maxdepth 2 -name symbol-surface-index.json 2>/dev/null | head -1)"
        if [[ -n "$INDEX_FILE" && -f "$INDEX_FILE" ]]; then
          echo "cache_hit_symbol_index=true" >> "$GITHUB_OUTPUT"
          echo "symbol-surface-index.json found at $INDEX_FILE — S3 phase can be skipped."
          echo "Index size: $(wc -c < "$INDEX_FILE") bytes"
        else
          echo "cache_hit_symbol_index=false" >> "$GITHUB_OUTPUT"
          echo "No symbol-surface-index.json under $SESSION_ROOT — S3 phase will run."
          if [[ -d "$SESSION_ROOT" ]]; then
            echo "Session root contents:"; ls -la "$SESSION_ROOT" || true
          fi
        fi
